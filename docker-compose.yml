services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: multitv
      POSTGRES_PASSWORD: multitv
      POSTGRES_DB: multitv
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multitv -d multitv"]
      interval: 5s
      timeout: 5s
      retries: 10

  multitv:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://multitv:multitv@postgres:5432/multitv?sslmode=disable
      # not: container-to-container iletişimde 5432 kullanılır (5433 sadece host makineden erişim için)
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
